<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Purple-Pink-Cyan Gradient matching the Tranzio logo -->
    <linearGradient id="neon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A855F7" />
      <stop offset="50%" stop-color="#EC4899" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>

    <!-- Neon Glow Filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="1.2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Premium dark background to pop in browser tabs -->
  <rect width="32" height="32" rx="8" fill="#090a15" />

  <!-- Stylized Sporty Italic 'T' -->
  <path
    d="M 4 8 L 24 8 L 22 12 L 16 12 L 11 26 L 7 26 L 12 12 L 6 12 Z"
    fill="url(#neon-grad)"
  />

  <!-- Glowing Neon Cyan period '.' -->
  <circle cx="18" cy="24" r="2.5" fill="#00F0FF" filter="url(#glow)" />
</svg>